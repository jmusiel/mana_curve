<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Auto Goldfish{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/client_results.js') }}"></script>
    <script src="{{ url_for('static', filename='js/deck_store.js') }}"></script>
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('dashboard.index') }}" class="nav-brand">Auto Goldfish</a>
        <div class="nav-links">
            <a href="{{ url_for('dashboard.index') }}">Decks</a>
            <a href="{{ url_for('decks.import_form') }}">Import</a>
        </div>
    </nav>
    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
