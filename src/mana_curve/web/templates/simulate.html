{% extends "base.html" %}
{% block title %}Simulate {{ deck_name }} - Mana Curve{% endblock %}
{% block content %}
<h1>Simulate: {{ deck_name }}</h1>
<form hx-post="{{ url_for('simulation.run', deck_name=deck_name) }}"
      hx-target="#job-status"
      hx-swap="innerHTML">
    <div class="form-row">
        <div class="form-group">
            <label for="turns">Turns</label>
            <input type="number" id="turns" name="turns" value="10" min="1" max="20">
        </div>
        <div class="form-group">
            <label for="sims">Simulations</label>
            <input type="number" id="sims" name="sims" value="1000" min="100" max="100000" step="100">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label for="min_lands">Min Lands</label>
            <input type="number" id="min_lands" name="min_lands" value="36" min="20" max="50">
        </div>
        <div class="form-group">
            <label for="max_lands">Max Lands</label>
            <input type="number" id="max_lands" name="max_lands" value="39" min="20" max="50">
        </div>
    </div>
    <div class="form-group">
        <label for="record_results">Record Detail Level</label>
        <select id="record_results" name="record_results">
            <option value="quartile" selected>Quartile</option>
            <option value="decile">Decile</option>
            <option value="centile">Centile</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Run Simulation</button>
</form>
<div id="job-status"></div>
{% endblock %}
