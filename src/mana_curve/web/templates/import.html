{% extends "base.html" %}
{% block title %}Import Deck{% endblock %}
{% block content %}
<h1>Import from Archidekt</h1>
<form method="POST" action="{{ url_for('decks.import_deck') }}">
    <div class="form-group">
        <label for="deck_url">Archidekt Deck URL</label>
        <input type="url" id="deck_url" name="deck_url" required
               placeholder="https://archidekt.com/decks/12345/my_deck">
    </div>
    <div class="form-group">
        <label for="deck_name">Deck Name</label>
        <input type="text" id="deck_name" name="deck_name" required
               placeholder="my_deck">
    </div>
    <button type="submit" class="btn btn-primary">Import</button>
</form>
{% endblock %}
